<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBTI 社会行为特质测评</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f8f5f2;
            color: #4a4a4a;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 4px 15px rgba(180, 160, 140, 0.12);
        }
        h1 {
            text-align: center;
            color: #6d5d5b;
            margin-bottom: 1rem;
            font-size: 22px;
        }
        .desc {
            text-align: center;
            color: #888;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .question-box {
            display: none;
        }
        .question {
            font-size: 17px;
            line-height: 1.7;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            padding: 14px 16px;
            border: 1px solid #e0d8d2;
            border-radius: 10px;
            background: #fff;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 15px;
        }
        .option-btn:hover {
            background-color: #f1e9e5;
            border-color: #c8b8b2;
        }
        .option-btn.selected {
            background-color: #e8d9d3;
            border-color: #b8a49c;
        }
        .btn-group {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
        }
        .nav-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: #b8a49c;
            color: #fff;
            cursor: pointer;
            font-size: 15px;
        }
        .nav-btn:disabled {
            background: #d4c7c2;
            cursor: not-allowed;
        }
        .result-box {
            display: none;
            line-height: 1.8;
        }
        .result-box h2 {
            color: #6d5d5b;
            margin-bottom: 1rem;
        }
        .result-item {
            margin: 12px 0;
        }
        .start-btn {
            display: block;
            margin: 2rem auto;
            padding: 14px 32px;
            background: #b8a49c;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SBTI 社会行为特质测评</h1>
        <p class="desc">共30道单选题，凭第一直觉选择，完成后自动生成你的性格报告</p >

        <!-- 开始页 -->
        <div id="start-page">
            <button class="start-btn" onclick="startQuiz()">开始测评</button>
        </div>

        <!-- 答题页 -->
        <div id="quiz-page" class="question-box">
            <div class="question" id="question-text"></div>
            <div class="options" id="options-box"></div>
            <div class="btn-group">
                <button class="nav-btn" id="prev-btn" onclick="prevQuestion()" disabled>上一题</button>
                <button class="nav-btn" id="next-btn" onclick="nextQuestion()">下一题</button>
            </div>
        </div>

        <!-- 结果页 -->
        <div id="result-page" class="result-box">
            <h2>你的SBTI测评结果</h2>
            <div class="result-item"><strong>你的SBTI角色：</strong><span id="role-name"></span></div>
            <div class="result-item"><strong>核心特质描述：</strong><p id="role-desc"></p ></div>
            <div class="result-item"><strong>发展建议：</strong><p id="role-suggest"></p ></div>
            <button class="start-btn" onclick="restartQuiz()">重新测评</button>
        </div>
    </div>

    <script>
        // 30道测试题目，每题对应 总管A、智多星B、和平使者C、倾听者D 四个维度
        const questions = [
            { q: "在团队项目中，你通常扮演什么角色？", opts: ["A 统筹安排任务，把控进度（总管）", "B 提供创意方案，解决难题（智多星）", "C 协调成员矛盾，维持氛围（和平使者）", "D 倾听大家想法，做好执行（倾听者）"] },
            { q: "遇到紧急突发问题，你第一反应是？", opts: ["A 立刻制定解决方案，分配工作", "B 快速联想多种可能性找突破口", "C 先安抚所有人情绪避免冲突", "D 先了解细节，再配合他人行动"] },
            { q: "朋友找你倾诉烦恼时，你更倾向？", opts: ["A 帮对方梳理问题，给出明确建议", "B 分析根源，提出创新解决思路", "C 共情对方感受，耐心安抚情绪", "D 安静倾听，陪伴对方宣泄"] },
            { q: "规划一次集体旅行，你更擅长？", opts: ["A 制定完整行程与预算清单", "B 发掘小众有趣的打卡地点", "C 照顾每个人的喜好与需求", "D 负责落地执行预定、核对信息"] },
            { q: "工作中出现意见分歧，你会？", opts: ["A 推动大家快速达成统一结论", "B 提出折中创新方案打破僵局", "C 避免争执，调和对立双方", "D 记录不同观点，服从最终安排"] },
            { q: "学习新技能时，你更看重？", opts: ["A 清晰的流程与执行标准", "B 原理逻辑与灵活变通方法", "C 友好的学习氛围与同伴互助", "D 循序渐进的练习与复盘"] },
            { q: "空闲时间，你更愿意？", opts: ["A 安排计划完成待办事项", "B 探索新鲜事物拓展认知", "C 和朋友闲聊维系关系", "D 独处放松整理自身状态"] },
            { q: "接到陌生任务，你首先会？", opts: ["A 明确目标，拆解任务步骤", "B 思考任务背后的核心需求", "C 询问相关人员的感受与期望", "D 确认细节，避免出错"] },
            { q: "团队取得成绩时，你更关注？", opts: ["A 整体目标是否圆满达成", "B 过程中创新方法的价值", "C 成员之间的协作氛围", "D 自己负责部分是否完成到位"] },
            { q: "做重要决策时，你依赖？", opts: ["A 过往经验与客观数据", "B 直觉预判与创新思路", "C 他人反馈与情感考量", "D 谨慎权衡，避免风险"] },
            { q: "被他人质疑观点时，你会？", opts: ["A 理性论证，坚持合理结论", "B 换角度提出更优方案", "C 避免争辩，照顾对方情绪", "D 反思自身，接纳不同意见"] },
            { q: "日常物品整理，你习惯？", opts: ["A 分类收纳，保持规整有序", "B 随性摆放，方便随手取用", "C 兼顾美观，营造舒适感", "D 够用即可，不刻意追求整洁"] },
            { q: "公开场合发言，你更擅长？", opts: ["A 逻辑清晰，把控全场节奏", "B 生动有趣，引发听众思考", "C 温和亲切，拉近彼此距离", "D 简洁务实，传递核心信息"] },
            { q: "面对未来规划，你更倾向？", opts: ["A 制定长期目标，稳步执行", "B 保持开放，随时调整方向", "C 兼顾家人朋友的期待", "D 立足当下，做好眼前事"] },
            { q: "帮他人解决问题，你更在意？", opts: ["A 问题是否高效解决", "B 方法是否新颖有效", "C 对方是否感到被理解", "D 方案是否稳妥无风险"] },
            { q: "参加多人聚会，你通常？", opts: ["A 带动话题，掌控交流节奏", "B 分享趣事，活跃整体氛围", "C 照顾内向者，避免冷场", "D 安静旁观，偶尔参与交流"] },
            { q: "获取信息时，你更喜欢？", opts: ["A 结构化的报告与总结", "B 多维度的观点与分析", "C 生活化的分享与故事", "D 细节详实的一手资料"] },
            { q: "工作截止日期临近，你会？", opts: ["A 加快节奏，确保按时交付", "B 优化方案，提升最终质量", "C 协调团队，互相分担压力", "D 专注细节，避免仓促出错"] },
            { q: "评价一件事情，你优先看？", opts: ["A 结果是否达到预期目标", "B 过程是否有创新亮点", "C 是否让参与者感到舒适", "D 执行过程是否严谨稳妥"] },
            { q: "需要快速适应新环境，你会？", opts: ["A 快速熟悉规则，主动融入", "B 观察环境，寻找突破机会", "C 主动结交他人，建立关系", "D 低调观察，逐步适应节奏"] },
            { q: "收到负面评价，你第一反应？", opts: ["A 理性分析，针对性改进", "B 反思思路，尝试优化方法", "C 在意情绪，担心他人看法", "D 默默消化，避免再次出错"] },
            { q: "选择休闲读物，你偏爱？", opts: ["A 工具类、方法论书籍", "B 科普、脑洞类读物", "C 情感、故事类散文", "D 纪实、细节类内容"] },
            { q: "团队任务进度滞后，你会？", opts: ["A 催促成员，重新分配任务", "B 提出新思路，简化工作流程", "C 安抚成员，缓解焦虑情绪", "D 主动承担更多基础工作"] },
            { q: "制定消费计划，你更看重？", opts: ["A 预算管控，优先刚需支出", "B 体验优先，愿意为兴趣付费", "C 兼顾他人，优先人情消费", "D 谨慎储蓄，避免冲动开销"] },
            { q: "和他人产生误会，你会？", opts: ["A 主动沟通，快速澄清问题", "B 换种方式，化解矛盾氛围", "C 耐心解释，照顾对方感受", "D 等待时机，避免激化问题"] },
            { q: "学习遇到瓶颈，你会？", opts: ["A 复盘流程，寻找效率问题", "B 更换方法，尝试全新思路", "C 请教他人，获取情绪支持", "D 放慢节奏，夯实基础细节"] },
            { q: "组织集体活动，你更关注？", opts: ["A 流程顺畅，不出现意外", "B 活动有趣，留下深刻体验", "C 每个人都能参与进来", "D 成本可控，执行难度低"] },
            { q: "看待社会热点事件，你习惯？", opts: ["A 关注事件结果与解决方案", "B 思考背后逻辑与衍生影响", "C 共情当事人的情绪处境", "D 核实细节，不盲目下结论"] },
            { q: "提升自我时，你更倾向？", opts: ["A 补齐短板，强化执行力", "B 拓展优势，培养创新能力", "C 打磨共情，提升社交力", "D 沉淀细节，增强稳定性"] },
            { q: "结束一天工作，你复盘时会？", opts: ["A 核对任务，确认目标完成度", "B 总结经验，思考优化方法", "C 梳理情绪，调整身心状态", "D 整理资料，为次日做准备"] }
        ];

        // 角色结果库
        const roleInfo = {
            A: { name: "总管型（指挥者）", desc: "目标感极强，擅长统筹规划、掌控节奏，做事果断高效，有很强的责任心与领导力，适合带领团队推进事务。", suggest: "适当放慢节奏，多倾听他人想法，避免过度强势，兼顾效率与团队情绪。" },
            B: { name: "智多星型（创新者）", desc: "思维活跃，脑洞丰富，擅长挖掘问题根源、提供创新解决方案，学习与适应能力极强，是团队的创意核心。", suggest: "增强方案落地的耐心，多关注细节执行，让创新想法更好地转化为结果。" },
            C: { name: "和平使者型（协调者）", desc: "共情力强，性格温和，擅长化解矛盾、维系氛围，重视人际关系，能给身边人提供情绪支持，亲和力拉满。", suggest: "学会适当坚持自我观点，避免过度迁就他人，敢于表达真实想法。" },
            D: { name: "倾听者型（执行者）", desc: "沉稳务实，细心可靠，擅长倾听与执行，做事严谨稳妥，能很好地配合团队完成基础工作，稳定性极强。", suggest: "多主动表达自身想法，敢于争取机会，在稳妥的基础上适当突破自我。" }
        };

        let current = 0;
        let scores = { A:0, B:0, C:0, D:0 };
        let userAnswers = Array(questions.length).fill(null);

        // 开始测评
        function startQuiz() {
            document.getElementById("start-page").style.display = "none";
            document.getElementById("quiz-page").style.display = "block";
            showQuestion();
        }

        // 渲染题目
        function showQuestion() {
            const q = questions[current];
            document.getElementById("question-text").innerText = `${current+1}. ${q.q}`;
            const optBox = document.getElementById("options-box");
            optBox.innerHTML = "";
            q.opts.forEach((opt, idx) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => selectOption(opt[0]);
                if(userAnswers[current] === opt[0]) btn.classList.add("selected");
                optBox.appendChild(btn);
            });
            document.getElementById("prev-btn").disabled = current === 0;
            const nextBtn = document.getElementById("next-btn");
            nextBtn.innerText = current === questions.length-1 ? "查看结果" : "下一题";
        }

        // 选择选项
        function selectOption(type) {
            userAnswers[current] = type;
            showQuestion();
        }

        // 上一题
        function prevQuestion() {
            if(current > 0) { current--; showQuestion(); }
        }

        // 下一题/提交
        function nextQuestion() {
            if(current < questions.length-1) {
                current++;
                showQuestion();
            } else {
                // 统计得分
                scores = { A:0, B:0, C:0, D:0 };
                userAnswers.forEach(t => { if(t) scores[t]++; });
                const maxType = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
                const info = roleInfo[maxType];
                // 渲染结果
                document.getElementById("quiz-page").style.display = "none";
                document.getElementById("result-page").style.display = "block";
                document.getElementById("role-name").innerText = info.name;
                document.getElementById("role-desc").innerText = info.desc;
                document.getElementById("role-suggest").innerText = info.suggest;
            }
        }

        // 重新测评
        function restartQuiz() {
            current = 0;
            userAnswers = Array(questions.length).fill(null);
            scores = { A:0, B:0, C:0, D:0 };
            document.getElementById("result-page").style.display = "none";
            document.getElementById("start-page").style.display = "block";
        }
    </script>
</body>
</html>
